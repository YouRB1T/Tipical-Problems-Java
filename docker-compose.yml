services:
  app:
    build: .
    container_name: phone-service
    ports:
      - "8080:8080"
    environment:
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_METRICS_TAGS_APPLICATION: tipical-problems-java

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: phone-service-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./metrics/prometheus/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.3.0
    container_name: phone-service-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./metrics/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./metrics/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
